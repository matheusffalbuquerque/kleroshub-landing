apiVersion: apps/v1
kind: Deployment
metadata:
  name: kleroshub
  namespace: kleroshub
  labels:
    app: kleroshub
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: kleroshub
  template:
    metadata:
      labels:
        app: kleroshub
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      nodeSelector:
        kubernetes.io/hostname: srv1158721
      containers:
        - name: kleroshub
          image: ghcr.io/matheusffalbuquerque/kleroshub-landing:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: kleroshub-secrets
                  key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
            - name: NEXT_PUBLIC_SITE_URL
              valueFrom:
                secretKeyRef:
                  name: kleroshub-secrets
                  key: NEXT_PUBLIC_SITE_URL
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kleroshub-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: kleroshub-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kleroshub-secrets
                  key: RESEND_API_KEY
            - name: RESEND_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: kleroshub-secrets
                  key: RESEND_FROM_EMAIL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
